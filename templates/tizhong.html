{% extends "base.html" %}

{% block title %}体重{% endblock %}

{% block content %}
<div class="page-container">
    <script type="application/json" id="recordsData">{{ records_json | safe }}</script>

    <div class="compact-form-section">
        <div class="tags-group">
            <div class="tags-label">标签:</div>
            <div class="quick-tags" id="tagList"></div>
        </div>


        <div class="form-grid">
            <input type="date" id="recordDate" value="{{ today }}" class="compact-input date-input">
            <input type="number" id="recordWeight" step="0.1" placeholder="体重(kg)" class="compact-input" style="width:100px">
            <select id="recordTime" class="compact-input" style="width:160px">
                <option>07:00 - 09:00</option><option>09:00 - 12:00</option><option>12:00 - 15:00</option>
                <option>15:00 - 19:00</option><option>19:00 - 21:00</option><option>21:00 - 24:00</option>
                <option>00:00 - 07:00</option>
            </select>
            <input type="text" id="recordNote" placeholder="吃了什么..." class="compact-input desc-input">
            <button type="button" id="saveBtn" class="add-btn">保存</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="chart-panel" id="chartPanel">
            <div class="chart-range">
                <a href="?limit=10" class="range-btn {% if current_limit == '10' %}active{% endif %}">10条</a>
                <a href="?limit=30" class="range-btn {% if current_limit == '30' %}active{% endif %}">30条</a>
                <a href="?limit=100" class="range-btn {% if current_limit == '100' %}active{% endif %}">100条</a>
                <a href="?limit=0" class="range-btn {% if current_limit == '0' %}active{% endif %}">全部</a>
                <button type="button" id="exportBtn" class="range-btn export-btn" title="导出当前数据为JSON">导出JSON</button>
            </div>
            <div class="tooltip" id="tooltip"></div>
            <svg id="weightChart" viewBox="0 0 600 350" style="width:100%;height:auto">
                <line x1="50" y1="30" x2="50" y2="300" stroke="#ddd" stroke-width="1"/>
                <line x1="50" y1="300" x2="570" y2="300" stroke="#ddd" stroke-width="1"/>
                <polyline id="weightLine" fill="none" stroke="#7B3F00" stroke-width="2.5" stroke-linejoin="round"/>
                <line class="cross-line" id="crossV" y1="30" y2="300"/>
                <line class="cross-line" id="crossH" x1="50" x2="570"/>
                <circle class="cross-dot" id="crossDot" r="5" fill="none" stroke="#e74c3c" stroke-width="2"/>
                <g id="pointsGroup"></g>
                <g id="labelsGroup"></g>
            </svg>
        </div>
        <div class="detail-panel" id="detailPanel"></div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.page-container{max-width:1100px;margin:0 auto;padding:15px}
.main-layout{display:flex;gap:15px;min-height:500px}
.chart-panel{flex:1;min-width:0;border:1px solid #e0e0e0;padding:15px;position:relative;background:#fff;border-radius:6px}
.detail-panel{width:320px;flex-shrink:0;border:1px solid #e0e0e0;padding:12px;background:#fff;border-radius:6px;overflow-y:auto}
.chart-range{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.range-btn{padding:3px 10px;border:1px solid #ddd;border-radius:3px;font-size:11px;color:#666;text-decoration:none;background:#f9f9f9;cursor:pointer}
.range-btn:hover{background:#eee}
.range-btn.active{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}
.export-btn{margin-left:12px;background:var(--primary-color);color:#fff;border-color:var(--primary-color);font-weight:500}
.export-btn:hover{background:var(--primary-dark);border-color:var(--primary-dark);color:#fff}
.detail-date{font-size:14px;font-weight:700;margin-bottom:8px;padding-bottom:6px;color:var(--primary-color);border-bottom:1px solid #f0f0f0}
.detail-weight{font-size:24px;font-weight:700;color:#333;margin-bottom:10px}
.note-list{list-style:none;padding:0;margin:0}
.note-item{display:flex;align-items:flex-start;padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:12px;color:#555;line-height:1.4}
.note-text{flex:1;word-break:break-word}
.tag-btn{padding:3px 10px;border:1px solid #ddd;border-radius:12px;background:#f5f5f5;color:#555;font-size:11px;cursor:pointer;white-space:nowrap}
.tag-btn:hover{background:var(--primary-light);border-color:var(--primary-color);color:var(--primary-dark)}
.note-del{background:none;border:1px solid #e74c3c;color:#e74c3c;padding:1px 6px;border-radius:3px;cursor:pointer;font-size:10px;flex-shrink:0;margin-left:6px}
.note-del:hover{background:#e74c3c;color:#fff}
.no-record{color:#bbb;font-size:12px;margin-top:8px}
.unit{font-size:14px;color:#999;font-weight:400}
.cross-line{stroke:#999;stroke-width:1;stroke-dasharray:4,3;display:none;pointer-events:none}
.cross-dot{display:none;pointer-events:none}
.tooltip{display:none;position:absolute;background:rgba(0,0,0,.75);color:#fff;padding:4px 10px;border-radius:4px;font-size:12px;pointer-events:none;white-space:nowrap;z-index:10}
.data-point{cursor:pointer;fill:var(--primary-color)}
.data-point.active{fill:#e74c3c}
.quick-tags{margin: 5px;}

/* 黑暗模式 - 每个 class/id 单独一行 */
body.dark-mode .chart-panel{background:#242424;border-color:#444}
body.dark-mode .detail-panel{background:#242424;border-color:#444}
body.dark-mode .range-btn{background:#333;color:#ccc;border-color:#555}
body.dark-mode .range-btn.active{background:var(--primary-color);color:#fff;border-color:var(--primary-color)}
body.dark-mode .detail-date{color:#e0e0e0;border-color:#333}
body.dark-mode .detail-weight{color:#e0e0e0;border-color:#333}
body.dark-mode .note-item{color:#ccc;border-color:#333}
body.dark-mode .tag-btn{background:#333;color:#ccc;border-color:#555;margin-right: 5px;margin-bottom: 5px;}
body.dark-mode .tag-btn:hover{background:#3a2a1a;border-color:#a0522d;color:#e0c8a0}
body.dark-mode .tags-group{border-left-color:#444}
body.dark-mode .data-point{fill:#a0522d}
body.dark-mode .data-point.active{fill:#e74c3c}
body.dark-mode svg line{stroke:#555}
body.dark-mode svg polyline{stroke:#555}
body.dark-mode svg text{fill:#aaa}
</style>
{% endblock %}
{% block scripts %}
<script>
const $ = (s, p=document) => p.querySelector(s);
const $$ = (s, p=document) => [...p.querySelectorAll(s)];
const records = JSON.parse($('#recordsData').textContent);
const today = '{{ today }}';
let currentDate = today;

const tagPresets = [
    '70g生米+两个蛋白+400ml水->破壁米糊',
    '梅花肉(100g生重猪肉)+一点点杏鲍菇+配料（稻米油+小米椒+蒜头+生姜+蚝油+盐）炒菜 + 米饭 （色香味俱全） + 胆囊压力:0 - 几乎感觉不到 + 腹胀:0 - 几乎没感觉',
    
    '复合OTC VB(b1 3mg,b2 1.5mg,b6 0.2mg,烟酰胺10mg,泛酸钙1mg)',
    'OTC VC(100毫克)',
    'OTC B6(10毫克)',
    
    '训练意愿:0 - 完全没想法',
    '训练意愿:1 - 大脑想，身体抗拒',
    '训练意愿:2 - 低强度/低容量的锻炼了会',
    '训练意愿:3 - 中等强度/中低容量的锻炼了会',
    '训练意愿:4 - 中等强度/中等容量的锻炼了会',
    '训练意愿:5 - 中高强度/中高容量的锻炼了会',

    '腹胀:0 - 几乎没感觉',
    '腹胀:1 - 感觉有一点点胀气',
    '腹胀:2 - 很明显，小气球的感觉',
    '腹胀:3 - 大气球的感觉，非常的胀气',

    '胆囊压力:0 - 几乎感觉不到',
    '胆囊压力:1 - 感觉到有一点点压力或者闷胀',
    '胆囊压力:2 - 明显很感觉到，压力很大',
    '胆囊压力:3 - 让我感到痛了',

    '一天纯水(不包含米糊)大约: 1L以下',
    '一天纯水(不包含米糊)大约: 1L ~ 1.5L',
    '一天纯水(不包含米糊)大约: 1.5L ~ 2L',
    '一天纯水(不包含米糊)大约: 2L ~ 2.5L',


];

const getTimeSlot = () => ['00:00 - 07:00','07:00 - 09:00','09:00 - 12:00','12:00 - 15:00','15:00 - 19:00','19:00 - 21:00','21:00 - 24:00'][[7,9,12,15,19,21,24].findIndex(t => new Date().getHours() < t)];

const [W,H,PL,PR,PT,PB] = [600,350,50,30,40,50];
const [DW,DH] = [W-PL-PR, H-PT-PB];
let points = [], yLabels = [];

const buildPoints = () => {
    points = []; yLabels = [];
    if (!records.length) return;
    const weights = records.map(r => r.weight);
    const [minW, maxW] = [Math.max(Math.min(...weights)-1,0), Math.max(...weights)+1];
    const range = maxW - minW || 1;
    yLabels = Array.from({length: 5}, (_,i) => (minW + range/4*(4-i)).toFixed(1));
    records.forEach((r, i) => {
        const x = records.length===1 ? PL+DW/2 : PL + DW/(records.length-1)*i;
        points.push({cx:x, cy:PT+DH-(r.weight-minW)/range*DH, date:r.date, weight:r.weight});
    });
};

const renderChart = () => {
    buildPoints();
    if (!points.length) return;
    const showLabels = records.length <= 20;
    const r = records.length > 60 ? 3 : 5;
    
    $('#pointsGroup').innerHTML = points.map(p => 
        `<circle class="data-point${p.date===currentDate?' active':''}" cx="${p.cx}" cy="${p.cy}" r="${r}" data-date="${p.date}"/>`
    ).join('');
    
    const samplePoints = showLabels ? points : points.length<=10 ? points :
        [0,Math.floor(points.length/4),Math.floor(points.length/2),Math.floor(points.length*3/4),points.length-1].map(i=>points[i]);
    
    $('#labelsGroup').innerHTML = [
        ...samplePoints.map(p => `<text x="${p.cx}" y="${H-15}" text-anchor="middle" font-size="10" fill="#999">${p.date.substring(5)}</text>`),
        ...yLabels.flatMap((v,i) => {
            const yP = PT + DH/4*i;
            return `<text x="${PL-8}" y="${yP+4}" text-anchor="end" font-size="11" fill="#999">${v}kg</text>${i<4?`<line x1="${PL}" y1="${yP}" x2="${W-PR}" y2="${yP}" stroke="#eee" stroke-width="1" stroke-dasharray="4"/>`:''}`;
        })
    ].join('');
    
    $('#weightLine').setAttribute('points', points.map(p => `${p.cx},${p.cy}`).join(' '));
};

const renderTags = () => {
    $('#tagList').innerHTML = tagPresets.map(t => `<button type="button" class="tag-btn">${t}</button>`).join('');
    $('#tagList').onclick = e => {
        const btn = e.target.closest('.tag-btn');
        if (!btn) return;
        const idx = [...btn.parentElement.children].indexOf(btn);
        const input = $('#recordNote');
        input.value = input.value.trim() ? `${input.value.trim()} + ${tagPresets[idx]}` : tagPresets[idx];
        input.focus();
    };
};

const save = () => {
    const date = $('#recordDate').value;
    if (!date) return;
    const note = [$('#recordTime').value, $('#recordNote').value.trim()].filter(Boolean).join(': ');
    const payload = {date, note};
    const weight = $('#recordWeight').value.trim();
    if (weight) payload.weight = parseFloat(weight);
    
    fetch('/tizhong/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    }).then(r => r.json()).then(d => {
        if (d.success) {
            $('#recordNote').value = '';
            $('#recordTime').value = getTimeSlot();
            location.reload();
        } else alert(d.message);
    });
};

const deleteNote = (date, index) => {
    fetch('/tizhong/delete_note', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date, index})
    }).then(r => r.json()).then(d => d.success ? loadDetail(date) : alert(d.message));
};

const exportData = () => {
    const btn = $('#exportBtn');
    const orig = btn.textContent;
    btn.textContent = '导出中...';
    btn.disabled = true;
    const limit = new URLSearchParams(location.search).get('limit') || '30';
    fetch(`/tizhong/data?limit=${limit}`).then(r => r.json()).then(data => {
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(blob),
            download: `体重记录_${limit==='0'?'全部':limit+'条'}_${new Date().toISOString().replace(/[:.]/g,'-').substring(0,19)}.json`
        });
        a.click();
        btn.textContent = '导出成功';
    }).finally(() => setTimeout(() => {
        btn.textContent = orig;
        btn.disabled = false;
    }, 2000));
};

const setAttrs = (el, attrs) => Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));

const hideCross = () => {
    ['crossV','crossH','crossDot'].forEach(id => $(`#${id}`).style.display = 'none');
    $('#tooltip').style.display = 'none';
};

const selectDate = date => {
    if (currentDate === date) return;
    currentDate = date;
    $$('.data-point').forEach(p => p.classList.toggle('active', p.dataset.date === date));
    loadDetail(date);
};

const loadDetail = date => {
    fetch(`/tizhong/get_detail?date=${date}`).then(r => r.json()).then(d => {
        if (!d.success) return;
        const weight = d.has_record && d.weight!=null ? d.weight : '';
        const noteList = d.note_list || [];
        $('#detailPanel').innerHTML = `
            <div class="detail-date">${d.date}</div>
            ${weight ? `<div class="detail-weight">${weight} <span class="unit">kg</span></div>` : '<div class="detail-weight" style="color:#bbb">-- <span class="unit">kg</span></div>'}
            ${noteList.length ? `<ul class="note-list">${noteList.map((n,i) => `<li class="note-item"><span class="note-text">${n.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</span><button class="note-del" data-idx="${i}">删除</button></li>`).join('')}</ul>` : '<div class="no-record">暂无饮食记录</div>'}
        `;
        $$('.note-del').forEach(btn => btn.onclick = () => deleteNote(date, parseInt(btn.dataset.idx)));
    });
};

// ✅ 修复：用JS设置limit按钮的active状态
const currentLimit = new URLSearchParams(location.search).get('limit') || '30';
$$('.range-btn[href]').forEach(btn => {
    const hrefLimit = new URLSearchParams(btn.getAttribute('href').split('?')[1]).get('limit') || '30';
    btn.classList.toggle('active', hrefLimit === currentLimit);
});

$('#saveBtn').onclick = save;
$('#exportBtn').onclick = exportData;

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.closest('.compact-form-section')) { e.preventDefault(); save(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); exportData(); }
});

const chartPanel = $('#chartPanel');
chartPanel.onmousemove = e => {
    if (!points.length) return;
    const rect = $('#weightChart').getBoundingClientRect();
    if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return hideCross();
    
    const [sX, sY] = [W/rect.width, H/rect.height];
    const nearest = points.reduce((best, p) => {
        const dist = Math.hypot((e.clientX-rect.left)*sX-p.cx, (e.clientY-rect.top)*sY-p.cy);
        return dist < best.dist ? {point: p, dist} : best;
    }, {point: null, dist: Infinity});
    
    if (nearest.dist < 50) {
        const p = nearest.point;
        setAttrs($('#crossV'), {x1: p.cx, x2: p.cx});
        setAttrs($('#crossH'), {y1: p.cy, y2: p.cy});
        setAttrs($('#crossDot'), {cx: p.cx, cy: p.cy});
        ['crossV','crossH','crossDot'].forEach(id => $(`#${id}`).style.display = 'block');
        Object.assign($('#tooltip').style, {
            display: 'block',
            left: `${p.cx/W*rect.width+15}px`,
            top: `${p.cy/H*rect.height-30}px`
        });
        $('#tooltip').textContent = `${p.date}  ${p.weight}kg`;
        selectDate(p.date);
    } else hideCross();
};

chartPanel.onmouseleave = hideCross;

renderTags();
renderChart();
loadDetail(today);
$('#recordTime').value = getTimeSlot();
</script>
{% endblock %}
